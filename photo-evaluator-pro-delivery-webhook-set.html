<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Evaluator Pro</title>
  <meta http-equiv="refresh" content="0; url=./index.html">
  <script>
    const target = `./index.html${window.location.search}${window.location.hash}`;
    window.location.replace(target);
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 24px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <main>
    <h1>メインページへ移動しています</h1>
    <p>自動で切り替わらない場合は、<a href="./index.html">こちら</a>を開いてください。</p>
  </main>
</body>
</html>
